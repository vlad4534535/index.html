<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Game</title>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #status { font-size: 24px; color: #f1c40f; }
        canvas { display: none; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">ПРОВЕРКА БИБЛИОТЕКИ...</div>
        <div id="players">Игроков: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
async function init() {
    const statusText = document.getElementById('status');
    
    // 1. Проверяем, загрузилась ли библиотека
    if (typeof Playroom === "undefined") {
        statusText.innerText = "ОШИБКА: БИБЛИОТЕКА НЕ ЗАГРУЗИЛАСЬ. ПОПРОБУЙТЕ ВЫКЛЮЧИТЬ VPN ИЛИ ADBLOCK.";
        return;
    }

    try {
        statusText.innerText = "ПОДКЛЮЧЕНИЕ К СЕТИ...";
        
        // 2. Входим в мультиплеер
        await Playroom.insertCoin();
        statusText.innerText = "В СЕТИ!";
        document.getElementById('gameCanvas').style.display = 'block';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = [];
        
        // 3. Когда кто-то заходит
        Playroom.onPlayerJoin((state) => {
            const p = { state, id: state.id, color: state.getProfile().color.hex };
            state.setState("pos", {x: 200, y: 200});
            players.push(p);
            state.onQuit(() => players = players.filter(pl => pl.id !== state.id));
        });

        // 4. Движение (WASD)
        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function loop() {
            const me = Playroom.myPlayer();
            if (me) {
                let pos = me.getState("pos") || {x: 200, y: 200};
                if(keys['KeyW']) pos.y -= 5;
                if(keys['KeyS']) pos.y += 5;
                if(keys['KeyA']) pos.x -= 5;
                if(keys['KeyD']) pos.x += 5;
                me.setState("pos", pos);
            }

            // Отрисовка
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            players.forEach(p => {
                const pos = p.state.getState("pos");
                if (pos) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 20, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            
            document.getElementById('players').innerText = "Игроков: " + players.length;
            requestAnimationFrame(loop);
        }
        loop();

    } catch (e) {
        statusText.innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ: " + e.message;
    }
}

// Запуск
init();
</script>
</body>
</html>
