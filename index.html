<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stealth Multiplayer</title>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px;
            pointer-events: none; border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>

<div id="hud">
    <div style="color: #f1c40f; font-weight: bold;">СТАТУС: <span id="st">ПОДКЛЮЧЕНИЕ...</span></div>
    <div>HP: <span id="hp">100</span></div>
    <div>ИГРОКОВ: <span id="pc">0</span></div>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

let players = [];
let ruins = [];
const keys = {};

// Функция запуска
async function start() {
    try {
        // Проверка библиотеки
        if (typeof Playroom === "undefined") {
            setTimeout(start, 500);
            return;
        }

        // Вход в игру
        await Playroom.insertCoin();
        document.getElementById('st').innerText = "В СЕТИ";

        // Генерация карты (только для Хоста)
        if (Playroom.isHost()) {
            let map = [];
            for(let i=0; i<15; i++) {
                map.push({
                    x: Math.random() * (window.innerWidth - 100),
                    y: Math.random() * (window.innerHeight - 100),
                    w: 100, h: 100
                });
            }
            Playroom.setState("map", map, true);
        }

        // Когда заходит игрок
        Playroom.onPlayerJoin((state) => {
            const p = { state, id: state.id, color: state.getProfile().color.hex };
            state.setState("pos", {x: 100, y: 100});
            state.setState("angle", 0);
            players.push(p);
            state.onQuit(() => players = players.filter(pl => pl.id !== state.id));
        });

        loop();
    } catch (e) {
        console.error(e);
    }
}

// Управление
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function loop() {
    const me = Playroom.myPlayer();
    if (me) {
        let pos = me.getState("pos") || {x: 100, y: 100};
        if(keys['KeyW']) pos.y -= 3;
        if(keys['KeyS']) pos.y += 3;
        if(keys['KeyA']) pos.x -= 3;
        if(keys['KeyD']) pos.x += 3;
        me.setState("pos", pos);
    }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = '#1e272e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем стены
    ruins = Playroom.getState("map") || [];
    ctx.fillStyle = "#0a0a0a";
    ruins.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));

    // Рисуем игроков
    players.forEach(p => {
        const pos = p.state.getState("pos");
        if (pos) {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 15, 0, Math.PI*2);
            ctx.fill();
            
            // Имя игрока
            ctx.fillStyle = "white";
            ctx.fillText(p.state.getProfile().name, pos.x - 20, pos.y - 25);
        }
    });

    document.getElementById('pc').innerText = players.length;
}

start();
</script>
</body>
</html>
