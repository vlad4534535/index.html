<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Game</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { display: none; position: absolute; top: 0; left: 0; }
        #loading-screen { text-align: center; z-index: 100; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status">ЗАГРУЗКА БИБЛИОТЕК...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://unpkg.com/playroomkit@1.2.11/dist/multiplayer.js"></script>

    <script>
    // Главная функция игры
    async function start() {
        const statusText = document.getElementById('status');
        const loadingScreen = document.getElementById('loading-screen');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        try {
            statusText.innerText = "ПОДКЛЮЧЕНИЕ К СЕТИ...";
            
            // Запуск Playroom
            await Playroom.insertCoin();
            
            // Если мы здесь, значит всё ок. Прячем загрузку, показываем игру.
            loadingScreen.style.display = "none";
            canvas.style.display = "block";
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const keys = {};
            window.onkeydown = e => keys[e.code] = true;
            window.onkeyup = e => keys[e.code] = false;

            function loop() {
                const me = Playroom.myPlayer();
                if (me) {
                    let pos = me.getState("pos") || {x: canvas.width/2, y: canvas.height/2};
                    if(keys['KeyW'] || keys['ArrowUp']) pos.y -= 5;
                    if(keys['KeyS'] || keys['ArrowDown']) pos.y += 5;
                    if(keys['KeyA'] || keys['ArrowLeft']) pos.x -= 5;
                    if(keys['KeyD'] || keys['ArrowRight']) pos.x += 5;
                    me.setState("pos", pos);
                }

                // Рисование
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const players = Playroom.getStates();
                players.forEach(p => {
                    const pos = p.getState("pos");
                    const color = p.getProfile().color.hex;
                    if (pos) {
                        ctx.fillStyle = color;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 20, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = "white";
                        ctx.textAlign = "center";
                        ctx.fillText(p.getProfile().name, pos.x, pos.y - 30);
                    }
                });
                requestAnimationFrame(loop);
            }
            loop();

        } catch (err) {
            statusText.innerText = "ОШИБКА: " + err.message;
            console.error(err);
        }
    }

    // Ждем, пока Playroom появится в памяти
    function checkLibrary() {
        if (typeof Playroom !== "undefined") {
            start();
        } else {
            setTimeout(checkLibrary, 200);
        }
    }

    checkLibrary();
    </script>
</body>
</html>
