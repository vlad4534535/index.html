<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stealth Multiplayer Fix</title>
    <script src="https://unpkg.com/playroomkit@0.0.12/multiplayer.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="hud">
    <div style="color: #f1c40f; font-weight: bold;">СТАТУС: <span id="st">ИНИЦИАЛИЗАЦИЯ...</span></div>
    <div>ИГРОКОВ: <span id="pc">0</span></div>
</div>

<script>
// Чтобы избежать ошибок, проверяем наличие объекта Playroom
async function start() {
    const statusEl = document.getElementById('st');
    
    if (typeof Playroom === "undefined") {
        statusEl.innerText = "ОШИБКА: БИБЛИОТЕКА НЕ НАЙДЕНА";
        console.error("Playroom is not defined. Проверьте интернет или блокировщики.");
        return;
    }

    try {
        statusEl.innerText = "ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...";
        
        // Вход в игру
        await Playroom.insertCoin();
        statusEl.innerText = "В СЕТИ";

        // Если мы главные (Хост) - создаем карту
        if (Playroom.isHost()) {
            Playroom.setState("map", [{x: 200, y: 200, w: 100, h: 100}], true);
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = [];
        const keys = {};

        // Следим за игроками
        Playroom.onPlayerJoin((state) => {
            const p = { state, id: state.id, color: state.getProfile().color.hex };
            state.setState("pos", {x: 100, y: 100});
            players.push(p);
            state.onQuit(() => players = players.filter(pl => pl.id !== state.id));
        });

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function gameLoop() {
            // Движение
            const me = Playroom.myPlayer();
            if (me) {
                let pos = me.getState("pos") || {x: 100, y: 100};
                if(keys['KeyW']) pos.y -= 4; if(keys['KeyS']) pos.y += 4;
                if(keys['KeyA']) pos.x -= 4; if(keys['KeyD']) pos.x += 4;
                me.setState("pos", pos);
            }

            // Отрисовка
            ctx.fillStyle = '#1e272e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            players.forEach(p => {
                const pos = p.state.getState("pos");
                if (pos) {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 20, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.fillText(p.state.getProfile().name, pos.x - 20, pos.y - 30);
                }
            });

            document.getElementById('pc').innerText = players.length;
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

    } catch (err) {
        statusEl.innerText = "ОШИБКА СЕТИ";
        console.error(err);
    }
}

// Запуск при загрузке страницы
window.onload = start;
</script>
</body>
</html>
